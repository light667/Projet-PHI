# Blueprint Render : déploiement auto au push sur la branche par défaut.
# Secrets (GEMINI, Supabase) : Dashboard Render → Environment, ou `render env set`.
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: phi-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /ping
    autoDeploy: true
    envVars:
      - key: CORS_ORIGINS
        value: "https://phi-org.web.app,http://localhost:5173,http://127.0.0.1:5173"
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FRONTEND_BASE_URL
        value: "https://phi-org.web.app"
      - key: FRONTEND_BASE_URL
        value: "https://phi-org.web.app"
